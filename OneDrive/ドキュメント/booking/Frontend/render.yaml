services:
  - type: web
    name: yubus-backend
    runtime: docker
    plan: free
    dockerfilePath: OneDrive/ドキュメント/booking/Frontend/backend-java/Dockerfile
    dockerContext: OneDrive/ドキュメント/booking/Frontend/backend-java
    envVars:
      - key: PORT
        value: 10000
      - key: ALLOWED_ORIGIN
        sync: false
      - key: DB_URL
        sync: false
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_APP_PASSWORD
        sync: false
      - key: SMTP_FROM
        sync: false
